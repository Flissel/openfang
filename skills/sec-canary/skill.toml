[skill]
name = "sec-canary"
version = "0.1.0"
description = "Honeypot/deception system — deploys fake sensitive files and monitors access"
author = "vibemind"
tags = ["security", "honeypot", "deception"]

[runtime]
type = "python"
entry = "bridge.py"

[[tools.provided]]
name = "deploy_canaries"
description = "Deploy canary files (fake passwords, credentials, API keys) to Desktop/Documents. Returns list of deployed files."

[tools.provided.input_schema]
type = "object"
properties = {}

[[tools.provided]]
name = "canary_status"
description = "Show status of all deployed canary files (accessed, modified, deleted)."

[tools.provided.input_schema]
type = "object"
properties = {}

[[tools.provided]]
name = "cleanup_canaries"
description = "Remove all deployed canary files."

[tools.provided.input_schema]
type = "object"
properties = {}
