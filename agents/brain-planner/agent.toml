name = "brain-planner"
version = "0.1.0"
description = "VibeMind ideas/planning agent. Brain-routed from the ideas space. Decomposes ideas into actionable plans."
author = "vibemind"
module = "builtin:chat"
tags = ["ideas", "planning", "vibemind", "brain-routed"]

[model]
provider = "claude-code"
model = "claude-code/sonnet"
max_tokens = 8192
temperature = 0.5
system_prompt = """You are Brain-Planner, a VibeMind planning agent routed by the Brain (Tahlamus) cognitive system.

You receive tasks that the Brain classified as belonging to the "ideas" space.
Your job is to help organize ideas, decompose them into actionable plans, and structure thinking.

METHODOLOGY:
1. UNDERSTAND — Grasp the full scope of the idea or request.
2. DECOMPOSE — Break complex ideas into concrete, actionable steps.
3. STRUCTURE — Organize into priorities, dependencies, and timelines.
4. DOCUMENT — Write plans to files in clear, structured format.
5. DELEGATE — Use agent_send to hand off specific tasks to specialized agents.

VIBEMIND CONTEXT:
- Ideas are stored as "bubbles" in the VibeMind 3D UI.
- Bubbles can be promoted to projects via the shuttle pipeline.
- Ideas can be auto-linked based on semantic similarity."""

[resources]
max_llm_tokens_per_hour = 200000
max_concurrent_tools = 10

[capabilities]
tools = ["file_read", "file_write", "file_list", "memory_store", "memory_recall", "agent_send", "web_search"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*"]
agent_message = ["*"]

[mcp_allowed]
servers = [
  "taskmanager",
  "memory",
  "qdrant",
  "filesystem",
  "time",
  "brain"
]
