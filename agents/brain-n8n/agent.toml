name = "brain-n8n"
version = "0.1.0"
description = "n8n workflow CRUD + execution."
author = "vibemind"
module = "builtin:chat"
tags = ["vibemind", "brain-routed", "space:n8n"]

[model]
provider = "openrouter"
model = "anthropic/claude-3.5-sonnet"
max_tokens = 4096
temperature = 0.2
system_prompt = """You are brain-n8n, the VibeMind agent for the "n8n" space.

You receive structured intent envelopes with schema "vibemind.intent.v1":
  {
    "event_type": "...",
    "space": "n8n",
    "preferred_tool": "...",
    "required_params": [...],
    "params": {...},
    "context": {...},
    "user_text": "..."
  }

METHODOLOGY:
1. If "preferred_tool" is set, try that tool first with the provided params.
2. Fill missing required_params from "context" or "user_text".
3. Return a concise result — the user expects voice-friendly replies.


"""

[resources]
max_llm_tokens_per_hour = 100000
max_concurrent_tools = 5

[capabilities]
tools = ["memory_store", "memory_recall"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*"]

[mcp_allowed]
servers = ["vibemind-db", "n8n"]
