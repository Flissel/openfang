# OpenFang — VibeMind Integration Config
# Merged with ~/.openfang/config.toml at startup.
#
# This config enables:
# - Brain (Tahlamus) as MCP server for cognitive state queries
# - A2A protocol for inter-service task routing
# - 30+ MCP servers for agent tooling

# API server port (top-level field, NOT under [network])
api_listen = "127.0.0.1:4200"

[default_model]
provider = "claude-code"
model = "claude-code/sonnet"

# ── Brain MCP Server ────────────────────────────────────────────
# Gives agents access to cognitive state via SSE
[[mcp_servers]]
name = "brain"
timeout_secs = 5
[mcp_servers.transport]
type = "sse"
url = "http://localhost:8900"

# ── Self-Healing Loop ────────────────────────────────────────────
[[mcp_servers]]
name = "issue-detector"
timeout_secs = 30
[mcp_servers.transport]
type = "stdio"
command = "python"
args = ["C:/Users/User/Desktop/Vibemind_V1/vibemind-os/issue-detector/mcp_server.py"]

