# OpenFang — VibeMind Integration Config
# Copy to ~/.openfang/config.toml or merge with existing config.
#
# This config enables:
# - Brain (Tahlamus) as MCP server for cognitive state queries
# - A2A protocol for inter-service task routing
# - Claude Code as default model for brain-* agents

[default_model]
provider = "claude-code"
model = "claude-code/sonnet"

[network]
listen_addr = "127.0.0.1:4200"

# Brain (Tahlamus) MCP Server — gives agents access to cognitive state
[[mcp_servers]]
name = "brain"
timeout_secs = 5

[mcp_servers.transport]
type = "sse"
url = "http://localhost:8900"

# ── Security PoC MCP Servers ─────────────────────────────────────
# Real-time network security monitoring (WiFi, ARP, DNS, TLS, ports)
[[mcp_servers]]
name = "network-monitor"
timeout_secs = 15
[mcp_servers.transport]
type = "stdio"
command = "python"
args = ["C:/Users/User/Desktop/Vibemind_V1/vibemind-os/security/poc_network_monitor/mcp_server.py"]

# Endpoint hardening audit (Defender, BitLocker, secrets, USB, browser)
[[mcp_servers]]
name = "endpoint-hardening"
timeout_secs = 30
[mcp_servers.transport]
type = "stdio"
command = "python"
